spring.application.name=rs3-achievements-tracker
server.port=8080

# DataSource — override via env vars; defaults work for local dev
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:fullstackapp}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:136055}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# JWT — override JWT_SECRET with a strong base64-encoded 256-bit secret in production
app.jwt.secret=${JWT_SECRET:Y2hhbmdlLW1lLXVzZS1hLXJlYWwtMjU2LWJpdC1zZWNyZXQtaW4tcHJvZHVjdGlvbg==}

# Mail (Resend SMTP) — set RESEND_API_KEY in production
# MAIL_FROM must be a verified sender domain in your Resend account
# For testing on Resend's free plan, use: onboarding@resend.dev
spring.mail.host=smtp.resend.com
spring.mail.port=587
spring.mail.username=resend
spring.mail.password=${RESEND_API_KEY:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.from=${MAIL_FROM:noreply@rs3tracker.com}
app.url=${APP_URL:http://localhost:5173}
